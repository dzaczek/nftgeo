# nfpm config for nftgeo .deb / .rpm. Built per-arch via the Makefile / release
# workflow, which set VERSION and ARCH in the environment (nfpm expands ${...}).
name: nftgeo
arch: ${ARCH}
platform: linux
version: ${VERSION}
maintainer: "dzaczek <sirjacek@gmail.com>"
description: |
  Declarative nftables geo/abuse firewall with an operator CLI and a local
  dashboard/policy-editor. Filter by country/region/IP/group, block AbuseIPDB
  feeds, rate-limit brute force, and edit rules from a web UI - all as one tool.
vendor: dzaczek
homepage: https://github.com/dzaczek/nftgeo
license: AGPL-3.0
section: net
priority: optional
depends:
  - nftables
recommends:
  - curl
  - ca-certificates
  - iproute2
contents:
  - src: bin/nftgeo-update
    dst: /usr/sbin/nftgeo-update
    file_info:
      mode: 0755
  - src: bin/nftgeo
    dst: /usr/sbin/nftgeo
    file_info:
      mode: 0755
  - src: dist/nftgeo-ui
    dst: /usr/sbin/nftgeo-ui
    file_info:
      mode: 0755
  - src: dist/nftgeo-qos
    dst: /usr/sbin/nftgeo-qos
    file_info:
      mode: 0755
  - src: etc/config.example
    dst: /etc/nftgeo/config.example
    type: config
  - src: etc/rules.conf.example
    dst: /etc/nftgeo/rules.conf.example
    type: config
  - src: etc/qos.conf.example
    dst: /etc/nftgeo/qos.conf.example
    type: config
  - src: dist/units/nftgeo.service
    dst: /usr/lib/systemd/system/nftgeo.service
  - src: dist/units/nftgeo.timer
    dst: /usr/lib/systemd/system/nftgeo.timer
  - src: dist/units/nftgeo-ui.service
    dst: /usr/lib/systemd/system/nftgeo-ui.service
  - src: dist/units/nftgeo-qos.service
    dst: /usr/lib/systemd/system/nftgeo-qos.service
  - src: README.md
    dst: /usr/share/doc/nftgeo/README.md
  - src: CHEATSHEET.md
    dst: /usr/share/doc/nftgeo/CHEATSHEET.md
  - src: docs/REFERENCE.md
    dst: /usr/share/doc/nftgeo/REFERENCE.md
  - src: TESTING.md
    dst: /usr/share/doc/nftgeo/TESTING.md
  - src: TESTING_PL.md
    dst: /usr/share/doc/nftgeo/TESTING_PL.md
  - src: CONTRIBUTING.md
    dst: /usr/share/doc/nftgeo/CONTRIBUTING.md
  - src: CONTRIBUTING_PL.md
    dst: /usr/share/doc/nftgeo/CONTRIBUTING_PL.md
  - src: examples/*
    dst: /usr/share/doc/nftgeo/examples/
  - src: dist/man/nftgeo.8.gz
    dst: /usr/share/man/man8/nftgeo.8.gz
  - src: dist/man/nftgeo-update.8.gz
    dst: /usr/share/man/man8/nftgeo-update.8.gz
  - src: dist/man/nftgeo-ui.8.gz
    dst: /usr/share/man/man8/nftgeo-ui.8.gz
  - src: dist/man/nftgeo.conf.5.gz
    dst: /usr/share/man/man5/nftgeo.conf.5.gz
  - src: dist/man/nftgeo-qos.8.gz
    dst: /usr/share/man/man8/nftgeo-qos.8.gz
  - dst: /etc/nftgeo/rules.d
    type: dir
  - dst: /etc/nftgeo/groups.d
    type: dir
scripts:
  postinstall: packaging/postinstall.sh
  preremove: packaging/preremove.sh
