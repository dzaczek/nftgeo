# --- Internal firewall: zones & micro-segmentation ----------------------------
# Segment an internal network by interface and control traffic between segments.
# Needs IP forwarding (net.ipv4.ip_forward=1) and the zones defined in config.
#
# Define the zones in /etc/nftgeo/config (or a groups.d/*.conf), one interface
# list per segment (VLAN subinterfaces like eth0.100 are just interfaces):
#   ZONE_LAN="eth1"
#   ZONE_DMZ="eth2"
#   ZONE_GUEST="eth0.100"
#   ZONE_WAN="eth0"
#
# For true micro-segmentation, default-deny everything between zones in config:
#   SEGMENT_DEFAULT="deny"
# then open only the flows you need below. Without it, inter-zone traffic is open
# except where a "deny ... -> ..." rule blocks it.

allow lan   -> dmz   tcp 80              # LAN reaches the DMZ web server
allow lan   -> dmz   tcp 443             # ...and HTTPS
allow wan   -> dmz   tcp 443 from europe # world -> DMZ HTTPS, geo-filtered
allow guest -> wan   tcp web             # guests only reach the internet (SERVICE_WEB)
deny  dmz   -> lan   any -               # the DMZ can never open into the LAN
deny  guest -> lan   any -               # guests are isolated from the LAN

# The port field accepts SERVICE_<NAME> names, ranges and lists, just like a
# normal rule; "from <geo>" restricts the source by country/region/group.
# Return traffic for allowed flows is accepted automatically (established/related).
