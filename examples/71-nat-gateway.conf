# --- NAT gateway (masquerade / SNAT / DNAT port-forward) ----------------------
# Turn this host into a NAT router. Needs IP forwarding:
#   sysctl -w net.ipv4.ip_forward=1   (persist in /etc/sysctl.d/)
# nftgeo warns on apply if a NAT/forward/zone rule exists while forwarding is off.
#
# Pair these with forward-chain filter rules (see 70-gateway-forward.conf); NAT
# rewrites addresses, the forward chain decides what is allowed to pass.

# Egress: masquerade the internal network out via the WAN interface.
masquerade on eth0

# ...or, with a fixed/static public IP, source-NAT to it instead of masquerade:
# snat out on eth0 to 203.0.113.7

# Ingress: forward a WAN port to an internal host (port-forward / DNAT).
# dnat tcp 8080 to 10.0.0.5:80 on eth0     # WAN :8080 -> 10.0.0.5:80
# dnat udp 51820 to 10.0.0.9               # forward with no port remap
# dnat tcp 443 to [2001:db8::1]:8443       # IPv6 target uses [addr]:port
# dnat tcp 2222 to 10.0.0.5:22 from europe # restrict the forward to a source geo
#
# The forward chain policy is accept, so a DNAT'd packet passes; add explicit
# fwd-in rules if you run a tighter forward policy.
#
# Hairpin (LAN clients reaching the service via the public IP) is not auto-
# emitted - use split-horizon DNS, or add a manual prerouting-DNAT (matching
# ip daddr <public-ip>) + postrouting-masquerade (ip saddr <lan-subnet>) pair.
