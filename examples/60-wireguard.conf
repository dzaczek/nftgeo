# --- WireGuard VPN endpoint ---------------------------------------------------
# Peers can connect from anywhere, so keep the listener open to the world but
# abuse-filter it. Change 51820 if you use a different port.

deny  in udp 51820 abuse
allow in udp 51820 any

# Restrict to the regions your peers actually connect from, if they are known:
# allow in udp 51820 europe

# If this box also ROUTES traffic for its peers (acts as a VPN gateway), the
# forwarded traffic goes through the forward chain - see 70-gateway-forward.conf.
