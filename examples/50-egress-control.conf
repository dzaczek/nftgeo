# --- Egress control (restrict what the box may talk to) -----------------------
# By default nftgeo does NOT touch outbound traffic. Add "allow out" rules only
# when you want to *restrict* egress: a port you mention becomes closed to every
# destination except the listed targets.
#
# WARNING: if you restrict outbound 80/443, you must still be able to reach
# ipdeny.com and AbuseIPDB, or the next update cannot download its data. Cover
# them with the region below, or add their IPs to WHITELIST in config.

allow out tcp 443 europe,us      # only allow HTTPS to Europe/US destinations
allow out tcp 80  europe,us      # (updates, package mirrors, ACME, feeds)
deny  out any -   abuse          # never talk to blocklisted hosts, on any port

# Reminder: a client that only needs answers back does NOT need an "allow out" -
# inbound replies to connections you initiated flow automatically. Use these
# rules to *limit* egress, not to enable it.
