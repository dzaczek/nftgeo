# --- Mail server (Postfix + Dovecot) ------------------------------------------
# Inbound SMTP (25) MUST accept from any MTA on the Internet - do not geo-fence
# it, only abuse-filter it. Submission and mailbox ports serve *your users*, so
# you can usually restrict them to the region they live in.

deny  in tcp 25  abuse
allow in tcp 25  any             # receive mail from any sending MTA (worldwide)

allow in tcp 587 europe          # submission (your users) - adjust the region
allow in tcp 465 europe          # SMTPS submission
allow in tcp 993 europe          # IMAPS
allow in tcp 995 europe          # POP3S
# Close the submission/mailbox ports to everyone outside the region above.
# Rules match top-to-bottom, so these denies must come AFTER the allows.
deny  in tcp 587 any
deny  in tcp 465 any
deny  in tcp 993 any
deny  in tcp 995 any

# The server also delivers mail outbound on 25. Outbound is open by default, so
# you only need this if you restrict egress (see 50-egress-control.conf):
# allow out tcp 25 any
