# --- Ingress early drop (DDoS mitigation) --------------------------------------
# Copy to /etc/nftgeo/ingress.conf (or /etc/nftgeo/ingress.d/95-ingress.conf).
# These run in the nftables INGRESS hook — before prerouting and conntrack — so
# known-bad traffic is dropped the instant it hits the NIC, before it costs any
# routing/conntrack CPU. Needs Linux >= 5.10.
#
# Grammar (source-based, stateless — no direction, no connection state):
#   <accept|drop> <target> [proto] [port] [log]
#
# The whitelist (config WHITELIST / whitelist.conf) is ALWAYS accepted first here,
# so you can never lock yourself out at ingress. This is an EXTRA early layer, not
# a replacement for your "deny ... abuse" filter rules.

drop  abuse                 # shed the AbuseIPDB blacklist at the earliest point
# drop  cn,ru               # geo early-drop (only under heavy abuse from a region)
# accept 203.0.113.0/24     # explicit early accept for a trusted network
# drop  any tcp 22 log      # drop ALL new SSH at ingress except whitelisted, logged

# Caveat: ingress is stateless, so a "drop" here also drops established/related
# packets from that source. For inbound attackers that's exactly what you want;
# just don't "drop" a network you rely on for outbound connections.
