# --- Router / gateway (forwarded traffic) -------------------------------------
# Use fwd-in / fwd-out only when this host passes traffic BETWEEN networks (a VPN
# gateway or NAT router). "fwd-in" matches the source of forwarded traffic,
# "fwd-out" matches the destination. These build the forward chain; they do not
# affect traffic to the box itself (that is "in"/"out").

allow fwd-out tcp 80  any        # let the LAN browse out on HTTP
allow fwd-out tcp 443 any        # ...and HTTPS
allow fwd-in  tcp 443 europe     # forward inbound 443 (e.g. to a DMZ) only from EU
deny  fwd-in  any -   abuse      # drop forwarded traffic from blocklisted sources

# IPsec/VPN transit: forward ESP/AH only from where your tunnels terminate:
# allow fwd-in esp - europe
# allow fwd-in ah  - europe
