# --- Public web server (HTTP/HTTPS) -------------------------------------------
# Goal: reachable from anywhere, but drop known-bad sources. "any" means the whole
# Internet; the abuse deny is evaluated before it, so blocklisted IPs are still
# cut even though the port is open to the world.

deny  in tcp 80  abuse
deny  in tcp 443 abuse
allow in tcp 80  any             # HTTP open worldwide (redirects / ACME challenges)
allow in tcp 443 any             # HTTPS open worldwide

# Regional site instead of worldwide? Replace "any" with a region or country and
# the port becomes closed to everyone outside it:
# allow in tcp 443 europe
# allow in tcp 443 pl,de,fr
