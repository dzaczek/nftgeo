# --- Global abuse blocklist ---------------------------------------------------
# Drop everything from known-bad IPs, inbound and outbound, on every port and
# protocol. This is the broadest use of the "abuse" target.
#
# Needs ABUSEIPDB_API_KEY and/or ABUSE_FEEDS set in config, otherwise the sets are
# empty and these rules do nothing. The WHITELIST always wins over abuse, so your
# own hosts are never caught by it.

deny in  any - abuse
deny out any - abuse
