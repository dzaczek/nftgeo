# --- Ping / ICMP --------------------------------------------------------------
# Allow diagnostics. icmp has no ports, so the port field is "-". On IPv6, icmpv6
# also carries Neighbor Discovery, so allowing it keeps IPv6 working smoothly -
# don't block it wholesale.

allow in icmp   - any            # IPv4 ping
allow in icmpv6 - any            # IPv6 ping + Neighbor Discovery

# Restrict pings to your monitoring network instead of the whole world:
# allow in icmp - monitoring
