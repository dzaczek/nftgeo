# --- Prometheus node_exporter (metrics) ---------------------------------------
# Metrics must never be public - they leak host detail. Lock the exporter port to
# the host(s) that scrape it: allow the scraper, then close the port to everyone
# else with a trailing deny (rules match top-to-bottom, first match wins).

allow in tcp 9100 10.0.0.5       # your Prometheus server's IP
deny  in tcp 9100 any            # close 9100 to every other source

# Several collectors or a monitoring subnet? Define a group in config and
# reference it by its lowercase name:
# GROUP_MONITORING="10.0.0.0/24 198.51.100.7"   (in /etc/nftgeo/config)
# allow in tcp 9100 monitoring

# Same pattern for other exporters:
# allow in tcp 9256 monitoring    # process-exporter
# allow in tcp 9113 monitoring    # nginx-exporter
# allow in tcp 3000 monitoring    # grafana, if scraped internally

# Note: the Prometheus server SCRAPES outbound; it needs no rule here unless you
# geo-fence its egress, because replies to its own requests are always allowed.
