# --- SSH (admin access) -------------------------------------------------------
# Goal: reach SSH only from where you actually log in, and never from a known-bad
# source. Copy to /etc/nftgeo/rules.d/ and change the country and admin IP.
#
# SAFETY: adding "allow in tcp 22 ..." closes port 22 to everyone else - including
# the machine you are on right now. Put your current IP in WHITELIST (or a name in
# WHITELIST_HOSTS) in /etc/nftgeo/config *first*; the whitelist is checked before
# any of these rules and bypasses them.

deny  in tcp 22 abuse            # drop blocklisted IPs on SSH (needs a key/feed)
allow in tcp 22 pl               # allow SSH from Poland only - change the country
allow in tcp 22 203.0.113.10     # ...and one fixed admin IP outside that country

# Several admin IPs? Define GROUP_ADMINS in config and reference it by name:
# GROUP_ADMINS="203.0.113.10 198.51.100.0/24"   (in /etc/nftgeo/config)
# allow in tcp 22 admins
