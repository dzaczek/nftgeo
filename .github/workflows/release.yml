name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable

      - name: install system test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mandoc

      - name: install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: test
        run: make test

      - name: build artifacts (binaries, tarball, packages)
        run: make build tarball package

      - name: checksums
        run: |
          cd dist
          sha256sum nftgeo-ui-linux-* nftgeo-*.tar.gz *.deb *.rpm > SHA256SUMS
          cat SHA256SUMS

      - name: publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: false
          # Tags with a hyphen (e.g. v1.73.0-beta.1, -rc.1) publish as a
          # pre-release so they don't move the "Latest" pointer off a stable tag.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/nftgeo-ui-linux-amd64
            dist/nftgeo-ui-linux-arm64
            dist/nftgeo-*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS
