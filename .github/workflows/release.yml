name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - name: install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: test
        run: make test

      - name: build artifacts (binaries, tarball, packages)
        run: make build tarball package

      - name: checksums
        run: |
          cd dist
          sha256sum nftgeo-ui-linux-* nftgeo-*.tar.gz *.deb *.rpm > SHA256SUMS
          cat SHA256SUMS

      - name: publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/nftgeo-ui-linux-amd64
            dist/nftgeo-ui-linux-arm64
            dist/nftgeo-*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS
